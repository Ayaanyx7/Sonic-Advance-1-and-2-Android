name: Test Android Native Build

on:
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev xorg-dev libsdl2-dev

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Attempt native Android build
        run: |
          make android GAME_NAME=sa2 GAME_REGION=USA 2>&1 | tee build_log.txt

      - name: Upload build log regardless of outcome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build_log.txt
