name: Build Sonic Advance Android Shell

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Framework
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Install Target NDK Toolchain
        run: sdkmanager --install "ndk;25.2.9519653"

      - name: Fetch Clean SDL2 Dependency
        run: |
          rm -f sdl2.tar.gz
          rm -rf SDL2-2.30.0
          curl -L "https://github.com" -o sdl2.tar.gz
          tar -xzf sdl2.tar.gz
          rm -rf android-project/app/src/main/jni/SDL2
          mv SDL2-2.30.0 android-project/app/src/main/jni/SDL2

      - name: Execute Android NDK Compilation via Gradle
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.ndkArgs="SONIC_TARGET=SA1"

      - name: Upload Clean Engine APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Advance-Android-Shell
          path: android-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
