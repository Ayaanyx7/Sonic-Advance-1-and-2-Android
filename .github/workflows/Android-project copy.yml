name: Copy SDL Android Project

on:
  workflow_dispatch:

jobs:
  copy-sdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          path: SDL

      - name: Copy android-project
        run: |
          mkdir -p android-project
          cp -r SDL/android-project/* android-project/

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add android-project
          git commit -m "Import SDL android-project" || echo "Nothing to commit"
          git push
