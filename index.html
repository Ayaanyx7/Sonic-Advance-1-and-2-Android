
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Advance Asset Extractor</title>
    <style>
        body { background-color: #1a1a1a !important; color: #ffffff !important; font-family: sans-serif; text-align: center; padding: 40px; margin: 0; }
        .main-container { background: #2c3e50; max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 10px; border: 3px solid #3498db; }
        select, input, button { font-size: 16px; padding: 12px; margin: 15px auto; width: 80%; max-width: 300px; border-radius: 5px; border: none; display: inline-block; }
        button { background: #e74c3c; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #c0392b; }
        #status { font-weight: bold; color: #f1c40f; margin-top: 25px; font-size: 18px; }
        .error-box { background: #000; color: #ff7675; padding: 10px; border-radius: 5px; margin-top: 15px; font-family: monospace; display: none; text-align: left; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>Sonic Advance Asset Extractor</h1>
        <p>Extract your graphics and sound files completely client-side inside your browser.</p>
        
        <div>
            <label for="game-select">Target Profile:</label><br>
            <select id="game-select">
                <option value="sa1">Sonic Advance 1 (Europe)</option>
                <option value="sa2">Sonic Advance 2 (USA)</option>
            </select>
        </div>
        
        <div style="margin-top: 20px;">
            <input type="file" id="rom-input" accept=".gba"><br>
            <button onclick="processRom()">Extract and Package Assets</button>
        </div>
        
        <div id="status">System Status: Preparing background network frameworks...</div>
        <div id="error-box" class="error-box"></div>
    </div>

    <!-- Injecting external dependencies with fallback tracking hooks -->
    <script>
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                const box = document.getElementById('error-box');
                box.style.display = 'block';
                box.innerText = "⚠️ NETWORK BLOCK:\nFailed to download core WebAssembly frameworks. Your network firewall or connection is blocking access to CDN infrastructure.";
            }
        }, true);
    </script>
    <script async src="https://jsdelivr.net" onload="document.getElementById('status').innerText='System Status: Pyodide Core Active. Waiting for JSZip...';"></script>
    <script async src="https://cloudflare.com" onload="document.getElementById('status').innerText='System Status: Ready. Please upload your game ROM.';"></script>

    <script>
        async function processRom() {
            const input = document.getElementById('rom-input');
            const game = document.getElementById('game-select').value;
            const status = document.getElementById('status');
            
            if (typeof loadPyodide === 'undefined' || typeof JSZip === 'undefined') {
                return alert("Core libraries haven't finished loading yet. Verify your internet connection isn't blocked.");
            }
            if (input.files.length === 0) return alert("Please select a ROM file first!");
            
            status.innerText = "Status: Initializing internal WebAssembly Python environment...";
            let pyodide = await loadPyodide();
            
            const file = input.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            
            const targetRomName = (game === "sa1") ? "baserom_sa1.gba" : "baserom_sa2.gba";
            pyodide.FS.writeFile(targetRomName, uint8Array);
            
            status.innerText = "Status: Fetching extraction orchestration matrix tools...";
            const scriptResponse = await fetch(`https://githubusercontent.com`);
            const scriptText = await scriptResponse.text();
            
            try {
                status.innerText = "Status: Executing ROM decompilation loops (this will take a moment)...";
                await pyodide.runPythonAsync(scriptText);
                
                status.innerText = "Status: Bundling loose assets into container zip data payloads...";
                let zip = new JSZip();
                
                function packFolder(vPath, zipTarget) {
                    try {
                        let items = pyodide.FS.readdir(vPath);
                        for (let item of items) {
                            if (item === "." || item === "..") continue;
                            let fullPath = vPath + "/" + item;
                            let mode = pyodide.FS.stat(fullPath).mode;
                            if (pyodide.FS.isDir(mode)) {
                                packFolder(fullPath, zipTarget.folder(item));
                            } else {
                                zipTarget.file(item, pyodide.FS.readFile(fullPath));
                            }
                        }
                    } catch(e) {}
                }
                
                packFolder('/graphics', zip.folder('graphics'));
                packFolder('/sound', zip.folder('sound'));
                
                zip.generateAsync({type:"blob"}).then(function(content) {
                    let dlLink = document.createElement('a');
                    dlLink.href = URL.createObjectURL(content);
                    dlLink.download = `${game}_assets.zip`;
                    dlLink.click();
                    status.innerText = "Status: Extraction Complete! Drop unzipped folders directly onto phone storage path.";
                });
            } catch (err) {
                status.innerText = "CRITICAL ERROR: See console logs.";
                const box = document.getElementById('error-box');
                box.style.display = 'block';
                box.innerText = err;
            }
        }
    </script>
</body>
</html>
